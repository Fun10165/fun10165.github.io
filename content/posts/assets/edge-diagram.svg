<svg xmlns="http://www.w3.org/2000/svg" width="320" height="120" viewBox="0 0 320 120" role="img" aria-labelledby="title desc">
  <title id="title">Markdown fixture diagram</title>
  <desc id="desc">Three safe static nodes connected by arrows for a Markdown sample post.</desc>
  <rect width="320" height="120" rx="16" fill="#f7fafc"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3748"/>
    </marker>
  </defs>
  <g fill="#ffffff" stroke="#2d3748" stroke-width="2">
    <rect x="20" y="34" width="78" height="52" rx="10"/>
    <rect x="121" y="34" width="78" height="52" rx="10"/>
    <rect x="222" y="34" width="78" height="52" rx="10"/>
  </g>
  <g stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)">
    <path d="M 98 60 H 116"/>
    <path d="M 199 60 H 217"/>
  </g>
  <g fill="#2d3748" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">
    <text x="59" y="65">MD</text>
    <text x="160" y="65">HTML</text>
    <text x="261" y="65">Blog</text>
  </g>
</svg>
