 a:hover{transform:translateY(-2px);border-color:rgba(212,101,63,.45);background:rgba(255,255,255,.72)}.panel{border:1px solid rgba(31,43,56,.08);border-radius:2rem;background:var(--paper);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:clamp(1.4rem,4vw,2rem);margin:.75rem 0}h1,h2{font-family:DM Serif Display,Georgia,serif;line-height:1.12}h1{margin:0 0 .5rem;font-size:clamp(2rem,6vw,3.5rem)}h2{font-size:1.4rem;margin:1.5rem 0 .75rem}select{padding:.5rem .75rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;background:var(--paper)}.diff-line{padding:.15rem .5rem;border-radius:.25rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.88rem;white-space:pre-wrap;word-break:break-all}.diff-add{background:var(--ins)}.diff-del{background:var(--del-bg)}.diff-context{color:var(--muted)}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.nav-links{justify-content:flex-start}}@media(orientation:portrait){body{background-image:linear-gradient(rgba(239,229,210,0.82),rgba(239,229,210,0.92)),url('../../../bg-portrait.webp')}}</style></head><body><main class="shell"><nav class="nav" aria-label="Primary navigation"><a class="brand" href="../../../"><span class="brand-mark">F</span><span>Fun10165</span></a><div class="nav-links"><a href="../../../">Home</a><a href="../../../blog/">Blog</a><a href="../../../blog/search/">Search</a></div></nav><section class="panel"><h1>Compare Versions · 为什么我觉得 Oh My Pi 是当下最好的 Agent Harness</h1><p style="color:var(--muted)"><a href="../history/">← Back to history</a> &nbsp;·&nbsp; <a href="../">Current version</a></p><div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin:1rem 0"><label>From <select id="v1"></select></label><label>To <select id="v2"></select></label><button id="diffBtn" style="padding:.5rem 1rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;cursor:pointer;background:var(--panel);color:#fdf7ea">Compare</button></div><div id="diffOutput"></div></section></main><script>var VERSIONS=[{"id":"1","createdAt":"2026-07-01","title":"为什么我觉得 Oh My Pi 是当下最好的 Agent Harness","hash":"b8fc6af4c50dacf2","content":"\n自 Claude Code 诞生，以及各模型厂商开始专门针对 agent 场景训练模型之后，agent 终于进化到了\"可用\"的阶段。\n\n可惜现在的 Agent Harness 绝大多数都不太行，所以我可以直接在这里简单地说明为什么 OMP 是我唯一的选择。\n\n## Claude Code\n\n谁想要 Anthropic 这个闭源的东西？Agent 拥有你电脑上至少用户级的工具权限，出于安全考虑应该拒绝使用任何闭源 Agent。同理，Cursor、Trae、ZCode、CodeBuddy/WorkBuddy、Copilot、Qoder、文心快码、Augment 等也是类似的问题。\n\n## Gemini CLI\n\n一坨，Google 大公司病的产物。所以也不推荐衍生的 Qwen Code。\n\n## OpenClaw\n\n纯 slop，认真的吗要用这个？我到现在都不会用他那个前端配置好 gateway。Why not AstrBot？\n\n## Hermes Agent\n\n抄袭中国团队 EvoMap 的东西，然后靠炒作火了。拒绝这种没底线的开发团队。\n\n## OpenCode\n\n看在 OpenCode 对开源 Harness 生态的贡献上骂得轻点。我想问问 Anomalyco 最近在干什么呢——我在 M5 MacBook Air 上的启动时间已经能卡到好几分钟了，内存泄露的 bug 也没修好，含非 ASCII 字符的粘贴依旧格式混乱，稳定性连日常工作也胜任不了。\n\n不过 OpenCode 的 provider/model 中立、OpenCode Go 套餐还是挺好的。但是我觉得基于 OpenCode 基座开发东西不是好主意。\n\n## Crush\n\n没人觉得他们审美很差吗？而且有过和 OpenCode 现开发团队撕逼的历史，我就不想用了。\n\n## Pi\n\n弃用 OpenCode 后尝试的 Agent Harness。说实话这个有点过于简单了，所以必定要自己维护大量的插件。我向来觉得各自维护解耦（不 monorepo）的插件会非常折磨，于是转向使用 Oh My Pi 了。\n\n## Codex\n\n次选项。但是现在默认不显示思考内容让人非常恼火，功能也不齐全，subagent 如同虚设。稳定性很好。\n\n## Oh My Pi\n\n主选项，相当惊喜。稳定性远超 OpenCode，功能相当齐全，性能和可玩性都很好。\n"}];var v1=document.getElementById('v1');var v2=document.getElementById('v2');var btn=document.getElementById('diffBtn');var out=document.getElementById('diffOutput');VERSIONS.forEach(function(v,i){var o1=document.createElement('option');o1.value=i;o1.textContent='v'+v.id+' ('+v.createdAt+')';v1.appendChild(o1);var o2=o1.cloneNode(true);v2.appendChild(o2)});if(VERSIONS.length>=2)v2.selectedIndex=VERSIONS.length-1;function lcs(a,b){var m=a.length,n=b.length;var dp=new Array(m+1);for(var i=0;i<=m;i++){dp[i]=new Array(n+1);for(var j=0;j<=n;j++)dp[i][j]=0}for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);var i=m,j=n,ops=[];while(i>0||j>0){if(i>0&&j>0&&a[i-1]===b[j-1]){ops.unshift({t:'eq',l:a[i-1]});i--;j--}else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ops.unshift({t:'add',l:b[j-1]});j--}else{ops.unshift({t:'del',l:a[i-1]});i--}}return ops}function escape(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}btn.onclick=function(){var a=VERSIONS[parseInt(v1.value)];var b=VERSIONS[parseInt(v2.value)];var diff=lcs(a.content.split('\n'),b.content.split('\n'));var html='<h2>v'+a.id+' → v'+b.id+'</h2>';diff.forEach(function(op){if(op.t==='eq')html+='<div class="diff-line diff-context"> '+escape(op.l)+'</div>';else if(op.t==='add')html+='<div class="diff-line diff-add">+'+escape(op.l)+'</div>';else html+='<div class="diff-line diff-del">-'+escape(op.l)+'</div>'});out.innerHTML=html}</script></body></html>
