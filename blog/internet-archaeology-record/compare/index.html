anslateY(-2px);border-color:rgba(212,101,63,.45);background:rgba(255,255,255,.72)}.panel{border:1px solid rgba(31,43,56,.08);border-radius:2rem;background:var(--paper);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:clamp(1.4rem,4vw,2rem);margin:.75rem 0}h1,h2{font-family:DM Serif Display,Georgia,serif;line-height:1.12}h1{margin:0 0 .5rem;font-size:clamp(2rem,6vw,3.5rem)}h2{font-size:1.4rem;margin:1.5rem 0 .75rem}select{padding:.5rem .75rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;background:var(--paper)}.diff-line{padding:.15rem .5rem;border-radius:.25rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.88rem;white-space:pre-wrap;word-break:break-all}.diff-add{background:var(--ins)}.diff-del{background:var(--del-bg)}.diff-context{color:var(--muted)}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.nav-links{justify-content:flex-start}}@media(orientation:portrait){body{background-image:linear-gradient(rgba(239,229,210,0.82),rgba(239,229,210,0.92)),url('../../../bg-portrait.webp')}}</style></head><body><main class="shell"><nav class="nav" aria-label="Primary navigation"><a class="brand" href="../../../"><span class="brand-mark">F</span><span>Fun10165</span></a><div class="nav-links"><a href="../../../">Home</a><a href="../../../blog/">Blog</a><a href="../../../blog/search/">Search</a></div></nav><section class="panel"><h1>Compare Versions · 我在网上修文物: 互联网考古记录</h1><p style="color:var(--muted)"><a href="../history/">← Back to history</a> &nbsp;·&nbsp; <a href="../">Current version</a></p><div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin:1rem 0"><label>From <select id="v1"></select></label><label>To <select id="v2"></select></label><button id="diffBtn" style="padding:.5rem 1rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;cursor:pointer;background:var(--panel);color:#fdf7ea">Compare</button></div><div id="diffOutput"></div></section></main><script>var VERSIONS=[{"id":"1","createdAt":"2026-06-20","title":"我在网上修文物: 互联网考古记录","hash":"f59975b69b2da777","content":"\n## 引子\n\n在几几还不会年年的时候的自己看过的几年前的资料现大多已经散佚了：你也许能查到两年前的天气，但是已经很难查到两年前的今天的B站日榜第一是什么了，更别提两年前的今天你撸了多少次管。当然最后一个纯个人性的信息只能靠自己记录来解决，但是网上的东西还是有别人记录过的。\n\n## 两种古\n\n互联网的考古有两种古，一种是古而不移，之前有人放在那里了，就不动了，后来要么是无人问津要么是被隐蔽地删除了；另一种是忒修斯之船，古的东西被新的东西覆盖了。幸好这两种古都可以通过归档的手段进行存储。\n\n## Wayback Machine\n\n> Explore more than 1 trillion web pages saved over time\n\nWayback Machine 存储了非常多的互联网资料，特别适合查找一些过往资料。\n但是 archive 机制不明，对于一些并不冷门但可能存放于私域流量平台上的网页没有 archive.\n\nbtw, 现在的英语高考卷A题还在用上古网站的排版。去参观一下上古网站的排版就知道我在说啥了。`https://web.archive.org/web/19970304041045/http://ubl.com/`\n\n## 搜索引擎\n\nGoogle，Bing，DuckDuckGo 都是可以制定特定时间范围的，\n\n另外提一嘴已经成为棍母的搜索引擎快照，先是百度停了，后是 Google 停了，这无疑是对互联网考古的一大打击。\n\n## 私域流量平台\n\n私域流量平台，包括 X、哔哩哔哩、贴吧、小红书、微信、知乎都是极大的富矿。但是据我所知这几家平台的检索机制就没有一个正常的，在这些平台上检索内容十分费劲，需要通过各种巧思来检索到几年前的内容。\n\n## AI 搜索供应商\n\n很遗憾的是 EXA 这个 AI 搜索供应商降低了老旧信息的权重，导致我让 Agent 搜索几年前的消息时特别费劲。\n\n关于 AI 搜索供应商，本来“获取信息”应该是 Agent 构建的非常重要的一环，但是长期以来并没有任何话题关注度。\n"}];var v1=document.getElementById('v1');var v2=document.getElementById('v2');var btn=document.getElementById('diffBtn');var out=document.getElementById('diffOutput');VERSIONS.forEach(function(v,i){var o1=document.createElement('option');o1.value=i;o1.textContent='v'+v.id+' ('+v.createdAt+')';v1.appendChild(o1);var o2=o1.cloneNode(true);v2.appendChild(o2)});if(VERSIONS.length>=2)v2.selectedIndex=VERSIONS.length-1;function lcs(a,b){var m=a.length,n=b.length;var dp=new Array(m+1);for(var i=0;i<=m;i++){dp[i]=new Array(n+1);for(var j=0;j<=n;j++)dp[i][j]=0}for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);var i=m,j=n,ops=[];while(i>0||j>0){if(i>0&&j>0&&a[i-1]===b[j-1]){ops.unshift({t:'eq',l:a[i-1]});i--;j--}else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ops.unshift({t:'add',l:b[j-1]});j--}else{ops.unshift({t:'del',l:a[i-1]});i--}}return ops}function escape(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}btn.onclick=function(){var a=VERSIONS[parseInt(v1.value)];var b=VERSIONS[parseInt(v2.value)];var diff=lcs(a.content.split('\n'),b.content.split('\n'));var html='<h2>v'+a.id+' → v'+b.id+'</h2>';diff.forEach(function(op){if(op.t==='eq')html+='<div class="diff-line diff-context"> '+escape(op.l)+'</div>';else if(op.t==='add')html+='<div class="diff-line diff-add">+'+escape(op.l)+'</div>';else html+='<div class="diff-line diff-del">-'+escape(op.l)+'</div>'});out.innerHTML=html}</script></body></html>
