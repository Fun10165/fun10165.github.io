teY(-2px);border-color:rgba(212,101,63,.45);background:rgba(255,255,255,.72)}.panel{border:1px solid rgba(31,43,56,.08);border-radius:2rem;background:var(--paper);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:clamp(1.4rem,4vw,2rem);margin:.75rem 0}h1,h2{font-family:DM Serif Display,Georgia,serif;line-height:1.12}h1{margin:0 0 .5rem;font-size:clamp(2rem,6vw,3.5rem)}h2{font-size:1.4rem;margin:1.5rem 0 .75rem}select{padding:.5rem .75rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;background:var(--paper)}.diff-line{padding:.15rem .5rem;border-radius:.25rem;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.88rem;white-space:pre-wrap;word-break:break-all}.diff-add{background:var(--ins)}.diff-del{background:var(--del-bg)}.diff-context{color:var(--muted)}@media(max-width:640px){.nav{align-items:flex-start;flex-direction:column}.nav-links{justify-content:flex-start}}</style></head><body><main class="shell"><nav class="nav" aria-label="Primary navigation"><a class="brand" href="../../../"><span class="brand-mark">F</span><span>Fun10165</span></a><div class="nav-links"><a href="../../../">Home</a><a href="../../../blog/">Blog</a><a href="../../../blog/search/">Search</a></div></nav><section class="panel"><h1>Compare Versions · 20260620的日记</h1><p style="color:var(--muted)"><a href="../history/">← Back to history</a> &nbsp;·&nbsp; <a href="../">Current version</a></p><div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin:1rem 0"><label>From <select id="v1"></select></label><label>To <select id="v2"></select></label><button id="diffBtn" style="padding:.5rem 1rem;border-radius:.75rem;border:1px solid var(--line);font:inherit;cursor:pointer;background:var(--panel);color:#fdf7ea">Compare</button></div><div id="diffOutput"></div></section></main><script>var VERSIONS=[{"id":"1","createdAt":"2026-06-20","title":"20260620的日记","hash":"85730a1f16e4f8e1","content":"\n被昨天晚上的毒火锅，即深职大对面的郝阿娘自助火锅，祸害过后，wzy和我在今天早上和中午都失去了食欲，所以中午并没有吃什么特别的。中午wzy点了海底捞的番茄汤泡饭，还是挺好吃的。在海底捞吃饭，如果是半夜学生六九折的话，性价比还是很高的——食材没有问题，手表的表带也不会受到一点气味的玷污，身上的衣服也可以被围裙保护住不沾油污，服务态度也很好，桌椅也很舒适，饮料和小料自助也很好。虽然海底捞貌似营收压力很大在各方面都出了严重的问题，品控和门店控制力也有下降，但个人感觉深圳益田假日里的店还是挺好的。\n\n吃饭的时候我还感觉番茄汤非常的咸，wzy提醒我没拌匀，嗯，我就这么笨。\n\n然后就是和wzy去自习去了，主要是在处理毛概ppt和先导杯算力的事，我发现我现在独立写一篇完整的文字（不依赖llm）已经十分费劲了！llm把我害惨了。另外在网络上搜集资料也是个相当费精力的事情。看到别人写的博客，非常的羡慕，感觉有产出是一件非常重要的事情，于是我决定开始独立撰写自己的博客了。\n\n晚上一起去了汉堡王去吃了9个小食和两个汉堡。汉堡王的饮料和新品小食有一个算一个都特别难吃，建议一个都不要点，只点汉堡、鸡条、琵琶腿，阿华田冰激凌最好。最让我气愤的是鸡排居然肉质是粉粉的，这他妈是和肯麦齐名的快餐店该有的品质？看了一下今年年初刚被中国资本完全掌控，看来是逐渐本土化了，但是鸡排居然能做到这种品质也是难以置信。\n\n回来打了会 AstroDX，妈的果然没睡好加上没吃好，今天状态烂完了，打maimai的精度也下降了。我一直觉得音游状态是一个衡量自己状态非常准的指标。我高中的时候打舞萌街机连简单的12都打不好，足以说明我当时是一个什么样的精神状态。\n\n今天也是第一天开始写博客，使用电脑写博客的效果好多了，可以非常轻松地更改自己的文字，非常的舒适。\n"}];var v1=document.getElementById('v1');var v2=document.getElementById('v2');var btn=document.getElementById('diffBtn');var out=document.getElementById('diffOutput');VERSIONS.forEach(function(v,i){var o1=document.createElement('option');o1.value=i;o1.textContent='v'+v.id+' ('+v.createdAt+')';v1.appendChild(o1);var o2=o1.cloneNode(true);v2.appendChild(o2)});if(VERSIONS.length>=2)v2.selectedIndex=VERSIONS.length-1;function lcs(a,b){var m=a.length,n=b.length;var dp=new Array(m+1);for(var i=0;i<=m;i++){dp[i]=new Array(n+1);for(var j=0;j<=n;j++)dp[i][j]=0}for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);var i=m,j=n,ops=[];while(i>0||j>0){if(i>0&&j>0&&a[i-1]===b[j-1]){ops.unshift({t:'eq',l:a[i-1]});i--;j--}else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){ops.unshift({t:'add',l:b[j-1]});j--}else{ops.unshift({t:'del',l:a[i-1]});i--}}return ops}function escape(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}btn.onclick=function(){var a=VERSIONS[parseInt(v1.value)];var b=VERSIONS[parseInt(v2.value)];var diff=lcs(a.content.split('\n'),b.content.split('\n'));var html='<h2>v'+a.id+' → v'+b.id+'</h2>';diff.forEach(function(op){if(op.t==='eq')html+='<div class="diff-line diff-context"> '+escape(op.l)+'</div>';else if(op.t==='add')html+='<div class="diff-line diff-add">+'+escape(op.l)+'</div>';else html+='<div class="diff-line diff-del">-'+escape(op.l)+'</div>'});out.innerHTML=html}</script></body></html>
